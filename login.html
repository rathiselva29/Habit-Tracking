<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HabitFlow</title>
  <meta name="description" content="Login to HabitFlow to continue tracking your habits and routines.">
  <link rel="icon" href="image/train img.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#4F46E5">
</head>
<body class="page-login">
  <main class="onboarding-shell">
    <section class="auth-card">
      <div class="auth-header">
        <div>
          <p class="eyebrow">Welcome back</p>
          <h1>Sign in to HabitFlow</h1>
          <p>One-step passwordless access to your habits, streaks, and daily motivation.</p>
        </div>
      </div>

      <form id="login-form" class="auth-form">
        <div class="form-floating">
          <input type="email" id="email" placeholder="" required>
          <label for="email">Email address</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="terms-checkbox">
          <label for="terms-checkbox">I agree to receive sign-in links and reminders.</label>
        </div>
        <div id="otp-section" class="hidden">
          <p id="otp-sent-message" class="form-note">Enter the code from your email.</p>
          <div class="form-floating">
            <input type="text" id="otp-code" placeholder="" inputmode="numeric" maxlength="6">
            <label for="otp-code">One-time code</label>
          </div>
          <div class="auth-actions">
            <button type="button" id="verify-otp-btn" class="btn btn-primary">Verify code</button>
            <button type="button" id="resend-otp-btn" class="btn btn-ghost">Resend code</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Send code</button>
        <button type="button" id="google-signin" class="btn btn-secondary" style="width: 100%;">Continue with Google</button>
      </form>

      <div class="auth-copy" style="margin-top: 1.5rem;">
        <p>Don’t have an account yet? Sign in to access premium habit coaching, streak reports, and smart reminders.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
