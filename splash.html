<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitFlow — Start Your Journey</title>
  <meta name="description" content="Welcome to HabitFlow premium habit tracking.">
  <link rel="icon" href="image/train img.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#4F46E5">
</head>
<body class="page-splash">
  <main class="onboarding-shell">
    <section class="splash-card">
      <div class="splash-hero reveal anim-fade-scale">
        <div class="reveal anim-fade-scale">
          <p class="eyebrow">Welcome</p>
          <h1 id="splash-headline">Your premium habit journey begins here.</h1>
          <p id="splash-copy">HabitFlow helps you create daily routines, track streaks, and celebrate progress with a sleek coaching experience.</p>
        </div>
        <div class="splash-visual reveal anim-slide-left shimmer">
          <div class="icon-bubbles">
            <div class="icon-bubble">✨</div>
            <div class="icon-bubble">📈</div>
            <div class="icon-bubble">🧘</div>
            <div class="icon-bubble">🌿</div>
          </div>
          <img src="assets/illustrations/train img.png" alt="HabitFlow premium launch illustration">
        </div>
      </div>
      <div class="onboarding-footer" style="margin-top: 1.5rem;">
        <button id="begin-onboarding-btn" class="btn btn-primary">Get started</button>
        <p class="form-note">Fast setup, personal insights, and an effortless daily rhythm.</p>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
