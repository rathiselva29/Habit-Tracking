<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Tracker — HabitFlow</title>
  <meta name="description" content="Track your daily habits, view streaks, and complete rituals with HabitFlow.">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#4F46E5">
</head>
<body class="page-daily">
  <!-- Top navbar removed in favor of fixed bottom navigation (glassmorphism) -->

  <main class="page-shell">
    <section class="daily-panel anim-fade-up delay-1">
      <div class="page-topbar">
        <div>
          <h2>Today's Routine</h2>
          <p>Complete your checklist, maintain your streak, and celebrate each win.</p>
        </div>
      </div>
      <div class="stats-grid">
        <article class="stat-card">
          <h3>Current Streak</h3>
          <div id="current-streak" class="stat-number">18</div>
          <div class="stat-highlight">Days of progress</div>
        </article>
        <article class="stat-card">
          <h3>Completed Today</h3>
          <div id="today-completed" class="stat-number">0</div>
          <div class="stat-highlight">Habits done</div>
        </article>
        <article class="stat-card">
          <h3>Daily Score</h3>
          <div id="today-score" class="stat-number">0%</div>
          <div class="stat-highlight">Completion percentage</div>
        </article>
      </div>
      <div id="daily-habits-container" class="daily-grid"></div>
    </section>
  </main>

  <script src="habits-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
