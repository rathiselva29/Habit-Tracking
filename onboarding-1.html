<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitFlow Onboarding — Step 1</title>
  <meta name="description" content="HabitFlow onboarding step 1.">
  <link rel="icon" href="image/train img.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#4F46E5">
</head>
<body class="page-onboarding">
  <main class="onboarding-shell">
    <section class="onboarding-card">
      <div class="onboarding-header">
        <div>
          <p class="eyebrow">Step 1</p>
          <h1>Personalize your habit path</h1>
          <p>We’ll help you choose routines that fit your goals, focus, and daily rhythm.</p>
        </div>
      </div>
      <div class="onboarding-slider">
        <article class="onboarding-slide active">
          <h2>Target the habits that matter</h2>
          <p>Focus on action-based habits like movement, hydration, reading, and sleep.</p>
        </article>
      </div>
      <div class="onboarding-footer">
        <button id="skip-onboarding" class="btn btn-ghost">Skip</button>
        <button id="onboarding-next" class="btn btn-primary">Continue</button>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
