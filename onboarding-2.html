<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitFlow Onboarding — Step 2</title>
  <meta name="description" content="HabitFlow onboarding step 2.">
  <link rel="icon" href="image/train img.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#4F46E5">
</head>
<body class="page-onboarding">
  <main class="onboarding-shell">
    <section class="onboarding-card">
      <div class="onboarding-header">
        <div>
          <p class="eyebrow">Step 2</p>
          <h1>Track progress beautifully</h1>
          <p>HabitFlow makes streaks, completion scores, and habit summaries simple to follow every day.</p>
        </div>
      </div>
      <div class="onboarding-slider">
        <article class="onboarding-slide active">
          <h2>Visual progress every day</h2>
          <p>From streaks to completion charts, you’ll always know how close you are to your goals.</p>
        </article>
      </div>
      <div class="onboarding-footer">
        <button id="skip-onboarding" class="btn btn-ghost">Skip</button>
        <button id="onboarding-next" class="btn btn-primary">Continue</button>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
